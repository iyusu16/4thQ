<!-- index.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>謎解き</title>

  <style>
    body {
      margin: 0;
      background-color: #111;
      color: #eee;
      font-family: sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 700px;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 40px;
      letter-spacing: 0.1em;
    }

    .question-title {
      font-size: 1.3rem;
      margin-bottom: 20px;
    }

    .image-box {
      background: #ffffff;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .image-box img {
      width: 100%;
      max-width: 500px;
      border-radius: 5px;
    }

    .hint {
      color: #aaa;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    input {
      width: 260px;
      padding: 12px;
      font-size: 1rem;
      text-align: center;

      border: none;
      border-radius: 5px;

      margin-bottom: 20px;
    }

    button {
      padding: 12px 24px;
      font-size: 1rem;

      border: none;
      border-radius: 5px;

      background: #444;
      color: white;

      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #666;
    }

    #message {
      margin-top: 20px;
      color: #ff8080;
      height: 20px;
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>謎解き</h1>

    <div class="question-title">
      ③①②の答えは何？
    </div>

    <div class="image-box">
      <!-- 問題画像 -->
      <img src="3問目.png" alt="問題画像">
    </div>

    <div class="hint">
      ※ 解答はひらがなで入力してください
    </div>

    <input type="text" id="answer" placeholder="こたえ" autocomplete="off">

    <br>

    <button onclick="checkAnswer()">解答する</button>

    <div id="message"></div>

  </div>

  <script>
    function checkAnswer() {

      const answer = document
        .getElementById("answer")
        .value
        .trim();

      if(answer === "あつい") {

        window.location.href = "clear.html";

      } else {

        document.getElementById("message").textContent =
          "ちがうにょ～～んwww";

      }
    }
  </script>

</body>
</html>
