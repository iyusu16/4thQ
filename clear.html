<!-- clear.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear</title>

  <style>
    body {
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      overflow: hidden;
    }

    .clear-box {
      text-align: center;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 4rem;
      letter-spacing: 0.2em;
      margin-bottom: 20px;
    }

    p {
      color: #aaa;
      font-size: 1.1rem;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="clear-box">
    <h1>CLEAR</h1>
    <p>「あったか～い」ってかなり熱いよね</p>
  </div>

</body>
</html>
